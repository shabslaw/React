<!DOCTYPE html>
<html>

  <head>
    <title>Clock</title>
  </head>

  <body>
    <div class="js-container"></div>

    <!-- Load external Javascript -->
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <!-- Load External Library -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    
      // const currentTime = dayjs().format('HH.ss');
      // const currentTime = dayjs().format('HH.mm');
      // const currentTime = dayjs().format();
      // const time = dayjs().valueOf();
      // const currentTime = dayjs().format('h:mma');
      const todaysDate = dayjs().format('MMMM D');
      const currentTime = dayjs().format('HH:mm:ss');

      // console.log(currentTime);
      // console.log(todaysDate);

      function App(){
        const [currentTime, setCurrentTime] = React.useState(dayjs().format('HH:mm:ss'))

        React.useEffect(()=>{
          setInterval(()=>{
            setCurrentTime(dayjs().format("HH:mm:ss"))
            // console.log("Run code")
            // console.log(currentTime)
          }, 1000)
        },[currentTime])

        return(
          <>
            <p>Current Time :{currentTime} </p>
          </>
        )
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container)
      root.render(<App />);

      // setInterval(() => {
      //   const paragraph = <p>Current Time :{dayjs().format('HH:mm:ss')} </p>;
      //   root.render(paragraph);
      // }, 1000)

    </script>
  </body>
</html>
