<!DOCTYPE html>
<html>

  <head>
    <title>Chatbot</title>
    <style>
      body{  
        font-family: arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      h1 {
        font-size: 16px;
        text-align: center;
        color: rgb(153, 153, 153);
        margin-top: 30px;
      }

      .loading-spinner{
        width: 40px;
        margin: -15px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-massage-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        align-items: start;
      }

      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        margin: 0px 10px 20px 10px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;
      }
    </style>
  </head>

  <body>
    <!-- HTML Element -->
    <div class="js-container"></div>

    <!-- Load External Library -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function useAutoScroll(dependencies){
        const chatMessageRef = React.useRef(null)

        React.useEffect(()=>{
          const containerElem = chatMessageRef.current;
          if(containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }

        }, [dependencies])

        return chatMessageRef;
      }

      function ChatbotInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(<img src="loading-spinner.gif" 
        className="loading-spinner" />);

        function saveInputText(event){
          setInputText(event.target.value);
        }
        
        async function sendMesssage(){
          const newChatMessages = [
            ...chatMessages, {
              message: inputText,
              sender: 'user',
              id : crypto.randomUUID()
            }
          ]

          setInputText('');
          setChatMessages(newChatMessages);

          setChatMessages([
            ...newChatMessages, {
              message: isLoading,
              sender: 'robot',
              id : crypto.randomUUID()
            }
          ])

          const response = await Chatbot.getResponseAsync(inputText);

          setChatMessages([
            ...newChatMessages, {
              message: response,
              sender: 'robot',
              id : crypto.randomUUID()
            }
          ])
        }

        function keyEvent(event){
          event.key === 'Enter' && sendMesssage();
          event.key === 'Escape' && setInputText('');
        }

        return(
          <div className="chat-input-container">
            <input 
              placeholder="Send a message to Chatbot" 
              size="30" 
              onChange={saveInputText}
              onKeyDown={keyEvent}
              value={inputText}
              className="chat-input"
            />
            <button 
              onClick={sendMesssage}
              className="send-button"
            >Send</button>
          </div>
        );
      }

      function ChatMessage({message, sender}){

        return(
          <div
            className={
              sender === "user" 
              ? "chat-message-user" 
              : "chat-message-robot"
            }
          >
            {sender === "robot" && (
              <img 
                src="robot.png" 
                className="chat-message-profile" 
              />
            )}
            <div className="chat-message-text" >
              {message}
            </div>
            {sender === "user" && (
              <img 
                src="user.png" 
                className="chat-message-profile"
              />
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}){
        const chatMessageRef = useAutoScroll(chatMessages);

        return(
          <div 
            className="chat-massage-container"
            ref={chatMessageRef}
          >
            {
              chatMessages.map((chatMessage)=>{
                return(
                  <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id} 
                  />
                );
              })
            }
          </div>
        )
      }

      function App(){
        const [chatMessages, setChatMessages] = React.useState([]);

        // const [chatMessages, setChatMessages] = array; // Array destruction

        // const chatMessages = array[0];
        // const setChatMessages = array[1];

        // console.log(chatMessages);
        
        
        return(
          <div className="app-container" >

            {chatMessages.length === 0 && <h1>Welcome to the chatbot project! Send a message using the textbox below.</h1>}
            
            <ChatMessages 
              chatMessages={chatMessages} 
            />

            <ChatbotInput
              chatMessages={chatMessages} 
              setChatMessages={setChatMessages}
            />
          </div>
        )
      }
        
    
    //   Get HTML Element, SetUp React, Use Render
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      // root.render(app);
      root.render(<App />);

    </script>
  </body>
</html>
